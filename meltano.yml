send_anonymous_usage_stats: false
project_id: "tap-open-mateo"
default_environment: test

environments:
- name: test

plugins:
  extractors:
  - name: tap-open-mateo
    namespace: tap_open_mateo
    pip_url: -e .
    capabilities:
      - state
      - catalog
      - discover
      - about
      - stream-maps
    settings:
      - name: api_key
        kind: password
        sensitive: true
        description: Open-Meteo API key for paid tier. If omitted, only Forecast API available.

      - name: locations
        kind: array
        description: List of locations to query. Each object requires name, latitude, longitude.

      - name: location_presets
        kind: string
        description: "Shortcut: 'us_population_centers' or 'energy_hubs'. Overrides locations."

      - name: hourly_variables
        kind: array
        description: Hourly variables to request from the API.

      - name: daily_variables
        kind: array
        description: Daily variables to request from the API.

      - name: models
        kind: array
        description: Weather models to query for forecast/historical.

      - name: ensemble_models
        kind: array
        description: Ensemble models to query.

      - name: climate_models
        kind: array
        description: CMIP6 climate models to query.

      - name: temperature_unit
        kind: string
        description: "Temperature unit: 'celsius' or 'fahrenheit'."

      - name: wind_speed_unit
        kind: string
        description: "Wind speed unit: 'kmh', 'ms', 'mph', 'kn'."

      - name: precipitation_unit
        kind: string
        description: "Precipitation unit: 'mm' or 'inch'."

      - name: timezone
        kind: string
        description: IANA timezone for daily aggregation.

      - name: forecast_days
        kind: integer
        description: Forecast horizon in days (max 16).

      - name: past_days
        kind: integer
        description: How many past days to include in forecast requests.

      - name: previous_run_days
        kind: array
        description: Which _previous_dayN suffixes to request.

      - name: historical_start_date
        kind: date_iso8601
        description: Start date for Historical API.

      - name: historical_end_date
        kind: date_iso8601
        description: End date for Historical API. Defaults to yesterday.

      - name: historical_chunk_days
        kind: integer
        description: Days per Historical API request chunk.

      - name: climate_start_date
        kind: date_iso8601
        description: Climate API start date.

      - name: climate_end_date
        kind: date_iso8601
        description: Climate API end date.

      # Historical Forecast
      - name: historical_forecast_start_date
        kind: date_iso8601
        description: Start date for Historical Forecast API (data from 2022+).

      - name: historical_forecast_end_date
        kind: date_iso8601
        description: End date for Historical Forecast API. Defaults to yesterday.

      # Seasonal Forecast
      - name: seasonal_models
        kind: array
        description: Seasonal forecast models to query.

      - name: seasonal_six_hourly_variables
        kind: array
        description: 6-hourly variables for seasonal forecasts.

      - name: seasonal_daily_variables
        kind: array
        description: Daily variables for seasonal forecasts.

      # Marine
      - name: marine_hourly_variables
        kind: array
        description: Hourly variables for marine forecasts.

      - name: marine_daily_variables
        kind: array
        description: Daily variables for marine forecasts.

      - name: length_unit
        kind: string
        description: "Length unit for marine API: 'metric' or 'imperial'."

      # Air Quality
      - name: air_quality_variables
        kind: array
        description: Hourly variables for air quality forecasts.

      - name: air_quality_domains
        kind: string
        description: "Air quality model domain: 'auto', 'cams_europe', 'cams_global'."

      # Satellite Radiation
      - name: satellite_start_date
        kind: date_iso8601
        description: Start date for satellite radiation archive.

      - name: satellite_end_date
        kind: date_iso8601
        description: End date for satellite radiation archive. Defaults to yesterday.

      - name: satellite_hourly_variables
        kind: array
        description: Hourly variables for satellite radiation.

      - name: satellite_daily_variables
        kind: array
        description: Daily variables for satellite radiation.

      - name: solar_panel_tilt
        kind: number
        description: Panel tilt angle (0-90 degrees) for GTI calculations.

      - name: solar_panel_azimuth
        kind: number
        description: Panel azimuth angle (-90 to 90 degrees) for GTI calculations.

      # Flood
      - name: flood_variables
        kind: array
        description: Daily variables for flood forecasts.

      - name: flood_ensemble
        kind: boolean
        description: If true, request all 50 ensemble members for flood data.

      - name: flood_forecast_days
        kind: integer
        description: Flood forecast horizon in days (max 210).

      # Geocoding
      - name: geocoding_search_terms
        kind: array
        description: Location names to search via Geocoding API.

      - name: geocoding_count
        kind: integer
        description: Max results per geocoding search (1-100).

      - name: geocoding_language
        kind: string
        description: Language for geocoding results.

      # Endpoint Selection
      - name: enabled_endpoints
        kind: array
        description: "Which endpoints to extract: forecast, historical, historical_forecast, ensemble, previous_runs, seasonal, marine, air_quality, satellite, flood, climate, geocoding, elevation."

      - name: max_requests_per_minute
        kind: integer
        description: Maximum API requests per minute.

      - name: min_throttle_seconds
        kind: number
        description: Minimum seconds between consecutive requests.

      - name: max_locations_per_request
        kind: integer
        description: Batch locations into multi-location requests.

      - name: strict_mode
        kind: boolean
        description: If true, raise on API errors instead of skipping partitions.

      - name: cell_selection
        kind: string
        description: "Grid cell selection: 'land' (default for weather), 'sea' (default for marine), 'nearest'. Controls which grid point is used for coordinates."

    select:
      - forecast_hourly.*
      - forecast_daily.*
      - historical_hourly.*
      - historical_daily.*
      - historical_forecast_hourly.*
      - historical_forecast_daily.*
      - ensemble_hourly.*
      - previous_runs_hourly.*
      - seasonal_six_hourly.*
      - seasonal_daily.*
      - marine_hourly.*
      - marine_daily.*
      - air_quality_hourly.*
      - satellite_radiation_hourly.*
      - satellite_radiation_daily.*
      - flood_daily.*
      - climate_daily.*
      - geocoding.*
      - elevation.*

    config:
      api_key: $OPEN_METEO_API_KEY
      location_presets: "us_population_centers"
      temperature_unit: "fahrenheit"
      wind_speed_unit: "mph"
      precipitation_unit: "inch"
      timezone: "America/Chicago"
      forecast_days: 16
      past_days: 7
      previous_run_days: [1, 2, 3, 5, 7]
      historical_start_date: "2020-01-01"
      historical_chunk_days: 365
      enabled_endpoints: ["forecast", "historical", "ensemble", "previous_runs"]
      ensemble_models: ["gfs025"]
      max_locations_per_request: 10
      max_requests_per_minute: 500

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
